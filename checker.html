.sample-btn { cursor:pointer; transition:all .2s; }

<script>
// ============================================================
// 校验规则引擎
// ============================================================
const RULES = {
  // 中英文之间需要空格
  chineseEnglishSpacing: {
    name: '中英文混排空格',
    desc: '中文与英文之间应添加空格',
    issueType: 'spacing',
    check: (text, lines) => {
      const violations = [];
      const re = /[\u4e00-\u9fff][a-zA-Z]|[a-zA-Z][\u4e00-\u9fff]/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const pos = m.index;
        const lineNum = text.substring(0, pos).split('\n').length;
        violations.push({
          line: lineNum,
          content: m[0],
          suggestion: m[0].split('').join(' '),
          fixable: true,
          fix: () => m[0].split('').join(' '),
          index: pos
        });
      }
      return violations;
    }
  },
  // 中文与数字之间需要空格
  chineseNumberSpacing: {
    name: '中文与数字空格',
    desc: '中文与数字之间应添加空格',
    issueType: 'spacing',
    check: (text, lines) => {
      const violations = [];
      const re = /[\u4e00-\u9fff][0-9]|[0-9][\u4e00-\u9fff]/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const lineNum = text.substring(0, m.index).split('\n').length;
        violations.push({
          line: lineNum,
          content: m[0],
          suggestion: m[0].split('').join(' '),
          fixable: true,
          fix: () => m[0].split('').join(' '),
          index: m.index
        });
      }
      return violations;
    }
  },
  // 全角英文字母
  fullwidthEnglish: {
    name: '全角英文字母',
    desc: '英文字母应使用半角字符',
    issueType: 'punctuation',
    check: (text, lines) => {
      const violations = [];
      const re = /[\uff21-\uff3a\uff41-\uff5a]/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const lineNum = text.substring(0, m.index).split('\n').length;
        const ch = m[0];
        const half = String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
        violations.push({
          line: lineNum,
          content: ch,
          suggestion: half,
          fixable: true,
          fix: () => half,
          index: m.index
        });
      }
      return violations;
    }
  },
  // 全角数字
  fullwidthNumber: {
    name: '全角数字',
    desc: '数字应使用半角字符',
    issueType: 'punctuation',
    check: (text, lines) => {
      const violations = [];
      const re = /[\uff10-\uff19]/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const lineNum = text.substring(0, m.index).split('\n').length;
        const ch = m[0];
        const half = String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
        violations.push({
          line: lineNum,
          content: ch,
          suggestion: half,
          fixable: true,
          fix: () => half,
          index: m.index
        });
      }
      return violations;
    }
  },
  // 全角逗号句号等中文标点使用错误
  wrongChinesePunctuation: {
    name: '中文标点使用',
    desc: '中文内容应使用全角标点（，。！？等）',
    issueType: 'punctuation',
    check: (text, lines) => {
      const violations = [];
      const re = /[\u4e00-\u9fff][,\.!?:;][\u4e00-\u9fff]|[\u4e00-\u9fff][,\.!?:;]$|^[,\.!?:;][\u4e00-\u9fff]/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const lineNum = text.substring(0, m.index).split('\n').length;
        const punct = m[0].match(/[,\.!?:;]/)[0];
        const map = {',':'，','.':'。','!':'！','?':'？',':':'：',';':'；'};
        violations.push({
          line: lineNum,
          content: m[0],
          suggestion: m[0].replace(punct, map[punct]),
          fixable: true,
          fix: () => m[0].replace(punct, map[punct]),
          index: m.index
        });
      }
      return violations;
    }
  },
  // 标题层级
  headingLevel: {
    name: '标题层级顺序',
    desc: '标题层级应逐级递增，避免跳级',
    issueType: 'heading',
    check: (text, lines) => {
      const violations = [];
      let lastLevel = 0;
      lines.forEach((line, i) => {
        const m = line.match(/^(#{1,6})\s/);
        if (m) {
          const level = m[1].length;
          if (lastLevel > 0 && level > lastLevel + 1) {
            violations.push({
              line: i + 1,
              content: line.trim(),
              suggestion: `${'#'.repeat(lastLevel + 1)} ${line.replace(/^#+\s/, '')}`,
              fixable: true,
              fix: () => `${'#'.repeat(lastLevel + 1)} ${line.replace(/^#+\s/, '')}`,
              index: 0
            });
          }
          lastLevel = level;
        } else if (line.match(/^[-=]+\s*$/)) {
          // Setext style heading, skip level check
        } else if (line.trim() !== '') {
          lastLevel = 0;
        }
      });
      return violations;
    }
  },
  // 列表格式一致性
  listConsistency: {
    name: '列表格式一致性',
    desc: '同一层级的列表应使用相同标记',
    issueType: 'list',
    check: (text, lines) => {
      const violations = [];
      let listMarkers = {};
      let inList = false;
      let listIndent = -1;
      lines.forEach((line, i) => {
        const indent = line.search(/\S/);
        const m1 = line.match(/^(\s*)([-*+]|\d+\.)\s/);
        if (m1) {
          const marker = m1[2];
          if (!inList) {
            listMarkers = {};
            listIndent = indent;
            inList = true;
          }
          if (indent === listIndent) {
            const markerType = marker.match(/^\d/) ? 'ordered' : 'unordered';
            if (!listMarkers.markerType) listMarkers.markerType = markerType;
            else if (listMarkers.markerType !== markerType) {
              violations.push({
                line: i + 1,
                content: line.trim(),
                suggestion: `统一使用${listMarkers.markerType === 'ordered' ? '有序' : '无序'}列表标记`,
                fixable: false
              });
            }
            if (markerType === 'unordered' && !listMarkers.char) listMarkers.char = marker;
            else if (markerType === 'unordered' && listMarkers.char && listMarkers.char !== marker) {
              violations.push({
                line: i + 1,
                content: line.trim(),
                suggestion: `统一使用 "${listMarkers.char}" 作为无序列表标记`,
                fixable: true,
                fix: () => line.replace(/^(\s*)[-*+]/, `$1${listMarkers.char}`)
              });
            }
          }
        } else if (line.trim() === '') {
          inList = false;
        }
      });
      return violations;
    }
  },
  // 连续空格
  consecutiveSpaces: {
    name: '多余空格',
    desc: '避免连续多个空格（缩进除外）',
    issueType: 'other',
    check: (text, lines) => {
      const violations = [];
      lines.forEach((line, i) => {
        const m = line.match(/^[^#\s]*(\s{3,})/);
        if (m && !line.match(/^\s{4}/)) {
          violations.push({
            line: i + 1,
            content: line.trim().substring(0, 40),
            suggestion: '减少多余空格，只保留一个空格',
            fixable: true,
            fix: () => line.replace(/(?<!\n)\s{2,}(?!\n)/g, ' ')
          });
        }
      });
      return violations;
    }
  },
  // 空行过多
  excessiveBlankLines: {
    name: '多余空行',
    desc: '连续空行不应超过2行',
    issueType: 'other',
    check: (text, lines) => {
      const violations = [];
      let blankCount = 0;
      lines.forEach((line, i) => {
        if (line.trim() === '') {
          blankCount++;
          if (blankCount > 2) {
            violations.push({
              line: i + 1,
              content: '(多余空行)',
              suggestion: '删除多余空行',
              fixable: true,
              fix: () => ''
            });
          }
        } else {
          blankCount = 0;
        }
      });
      return violations;
    }
  }
};

// 自定义规则存储
const CUSTOM_RULES_KEY = 'md_checker_custom_rules';

function loadCustomRules() {
  const saved = JSON.parse(localStorage.getItem(CUSTOM_RULES_KEY) || '[]');
  const rules = {};
  saved.forEach((r, idx) => {
    const key = 'custom_' + idx;
    rules[key] = {
      name: r.name,
      desc: r.desc || '自定义规则',
      issueType: r.type || 'other',
      check: (text, lines) => {
        const violations = [];
        try {
          const re = new RegExp(r.pattern, 'g');
          let m;
          while ((m = re.exec(text)) !== null) {
            const lineNum = text.substring(0, m.index).split('\n').length;
            violations.push({
              line: lineNum,
              content: m[0],
              suggestion: r.suggestion || '请检查此内容',
              fixable: false,
              index: m.index
            });
          }
        } catch(e) { /* 正则无效时跳过 */ }
        return violations;
      }
    };
  });
  return rules;
}

function saveCustomRule(name, pattern, type) {
  const saved = JSON.parse(localStorage.getItem(CUSTOM_RULES_KEY) || '[]');
  saved.push({ name: name, pattern: pattern, type: type, desc: name });
  localStorage.setItem(CUSTOM_RULES_KEY, JSON.stringify(saved));
}

function removeCustomRule(idx) {
  const saved = JSON.parse(localStorage.getItem(CUSTOM_RULES_KEY) || '[]');
  saved.splice(idx, 1);
  localStorage.setItem(CUSTOM_RULES_KEY, JSON.stringify(saved));
}

// ============================================================
// 示例文本
// ============================================================
const SAMPLE_TEXT = `# Markdown中文排版示例

## 排版规范测试

这是一段包含中英文混排的文本，例如：Hello世界、World你好。这里展示了不规范的中英文混排，正确写法应该是：Hello 世界、World 你好。

### 标点符号问题

中文内容中误用了半角标点,比如这里用了半角逗号.还有半角句号.正确应该使用全角标点，比如中文逗号和中文句号。

另外，全角英文字母也是常见问题：Ｈｅｌｌｏ，这里的英文字母是全角的。

### 数字相关

中文和数字之间也需要空格，例如：价格100元应该写成"价格 100 元"，2024年应该写成"2024 年"。全角数字问题：２０２４年。

#### 标题跳级问题

这里的标题从 ### 直接跳到了 #####（跳过了 ####），属于跳级。

##### 正确示例

以下是没有问题的内容：

### 列表格式

正确列表应该保持格式一致：
- 项目一
- 项目二
* 项目三（这里混用了不同标记）
- 项目四

### 多余空格和空行

这里  有  多余  空格。

正常情况下段落之间最多空两行。



上述内容包含各种常见的排版问题，通过本工具可以快速检测并修正。
`;

// ============================================================
// 状态
// ============================================================
let currentViolations = [];
let currentText = '';

// ============================================================
// DOM
// ============================================================
const editor = document.getElementById('editor');
const resultArea = document.getElementById('resultArea');
const charCount = document.getElementById('charCount');
const resultCount = document.getElementById('resultCount');

// ============================================================
// 主检查函数
// ============================================================
function checkNow() {
  const text = editor.value;
  if (!text.trim()) {
    resultArea.innerHTML = '<div class="text-center py-12 text-amber-500"><i class="fa fa-warning text-3xl mb-3 block"></i><p class="text-sm">请输入要检查的 Markdown 文本</p></div>';
    return;
  }

  currentText = text;
  const lines = text.split('\n');
  let allViolations = [];

  // 合并内置规则和自定义规则
  const allRules = { ...RULES, ...loadCustomRules() };

  Object.values(allRules).forEach(rule => {
    try {
      const violations = rule.check(text, lines);
      violations.forEach(v => { v.ruleName = rule.name; v.ruleDesc = rule.desc; v.issueType = rule.issueType; });
      allViolations = allViolations.concat(violations);
    } catch(e) {
      console.warn(`Rule ${rule.name} error:`, e);
    }
  });

  // 去重（相同位置只保留一条）
  const seen = new Set();
  currentViolations = allViolations.filter(v => {
    const key = `${v.line}-${v.index || 0}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // 更新统计
  updateStats(text);
  renderResults(currentViolations);
  resultCount.textContent = `发现 ${currentViolations.length} 个问题`;
}

function renderResults(violations) {
  if (violations.length === 0) {
    resultArea.innerHTML = `
      <div class="text-center py-12">
        <i class="fa fa-check-circle text-5xl mb-3 block text-emerald-400"></i>
        <p class="text-lg font-medium text-emerald-600">检查通过！</p>
        <p class="text-sm text-slate-400 mt-1">未发现排版规范问题</p>
      </div>`;
    return;
  }

  // 按行号排序
  violations.sort((a, b) => a.line - b.line);

  resultArea.innerHTML = violations.map((v, i) => `
    <div class="violation-item flex items-start gap-3 p-3 rounded-lg border border-slate-100 mb-2">
      <span class="violation-line">L${v.line}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <span class="issue-tag issue-${v.issueType}">${v.ruleName}</span>
          <span class="text-xs text-slate-400">${v.ruleDesc}</span>
        </div>
        <div class="text-sm text-slate-700 font-mono bg-slate-50 rounded px-2 py-1 break-all">
          <span class="text-red-500">${escapeHtml(v.content)}</span>
        </div>
        ${v.suggestion ? `<div class="text-xs text-emerald-600 mt-1"><i class="fa fa-arrow-right mr-1"></i>建议: ${escapeHtml(v.suggestion)}</div>` : ''}
        ${v.fixable ? `<button onclick="applyFix(${i})" class="text-xs text-indigo-500 hover:text-indigo-700 mt-1"><i class="fa fa-wrench mr-1"></i>应用此修正</button>` : ''}
      </div>
      <span class="text-xs text-slate-300 flex-shrink-0">#${i + 1}</span>
    </div>
  `).join('');
}

// ============================================================
// 自动修正
// ============================================================
function autoFix() {
  if (currentViolations.length === 0) {
    checkNow();
    if (currentViolations.length === 0) {
      alert('当前没有可修正的问题。');
      return;
    }
  }

  let text = editor.value;
  const fixable = currentViolations.filter(v => v.fixable);

  // 从后往前修正，避免位置偏移
  const sorted = [...fixable].sort((a, b) => (b.index || 0) - (a.index || 0));
  sorted.forEach(v => {
    if (typeof v.fix === 'function' && v.index !== undefined) {
      try {
        const replacement = v.fix();
        const start = v.index;
        const end = v.index + v.content.length;
        text = text.substring(0, start) + replacement + text.substring(end);
      } catch(e) {
        text = text.replace(v.content, v.suggestion);
      }
    }
  });

  editor.value = text;
  checkNow();
  addToast(`已自动修正 ${fixable.length} 个问题`);
}

function applyFix(index) {
  const v = currentViolations[index];
  if (!v || !v.fixable) return;
  let text = editor.value;
  if (v.index !== undefined) {
    const start = v.index;
    const end = v.index + v.content.length;
    const replacement = v.fix();
    text = text.substring(0, start) + replacement + text.substring(end);
  } else {
    text = text.replace(v.content, v.suggestion);
  }
  editor.value = text;
  const pos = text.indexOf(v.suggestion);
  if (pos >= 0) {
    editor.focus();
    editor.setSelectionRange(pos, pos + v.suggestion.length);
  }
  checkNow();
  addToast('已应用该修正');
}

// ============================================================
// 统计
// ============================================================
function updateStats(text) {
  const total = text.length;
  const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  const english = (text.match(/[a-zA-Z]+/g) || []).length;
  const violations = currentViolations.length;
  const fixable = currentViolations.filter(v => v.fixable).length;

  document.getElementById('statChars').textContent = total;
  document.getElementById('statChinese').textContent = chinese;
  document.getElementById('statEnglish').textContent = english;
  document.getElementById('statViolations').textContent = violations;
  document.getElementById('statFixable').textContent = fixable;
  charCount.textContent = `${total} 字符`;
}

// ============================================================
// 加载示例
// ============================================================
function loadSample() {
  editor.value = SAMPLE_TEXT;
  charCount.textContent = `${SAMPLE_TEXT.length} 字符`;
  checkNow();
  addToast('已加载示例文本');
}

function clearAll() {
  editor.value = '';
  currentViolations = [];
  currentText = '';
  resultArea.innerHTML = '<div class="text-center py-12 text-slate-400"><i class="fa fa-file-text-o text-4xl mb-3 block text-slate-200"></i><p class="text-sm">输入 Markdown 文本后点击「检查排版」</p></div>';
  resultCount.textContent = '等待检查...';
  ['statChars','statChinese','statEnglish','statViolations','statFixable'].forEach(id => document.getElementById(id).textContent = '0');
  charCount.textContent = '0 字符';
}

// ============================================================
// 导出报告
// ============================================================
function exportReport() {
  if (currentViolations.length === 0 && !currentText) {
    alert('请先检查文本');
    return;
  }
  let report = '# Markdown 排版检查报告\n\n';
  report += `检查时间：${new Date().toLocaleString()}\n\n`;
  report += `## 统计\n`;
  report += `- 总字符数：${document.getElementById('statChars').textContent}\n`;
  report += `- 中文字数：${document.getElementById('statChinese').textContent}\n`;
  report += `- 英文词数：${document.getElementById('statEnglish').textContent}\n`;
  report += `- 违规数：${document.getElementById('statViolations').textContent}\n`;
  report += `- 可修正：${document.getElementById('statFixable').textContent}\n\n`;
  report += `## 违规详情\n\n`;
  currentViolations.forEach((v, i) => {
    report += `### #${i+1} 行 ${v.line} — ${v.ruleName}\n`;
    report += `- 内容：${v.content}\n`;
    report += `- 建议：${v.suggestion}\n`;
    report += `- 可修正：${v.fixable ? '是' : '否'}\n\n`;
  });

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(report).then(() => addToast('报告已复制')).catch(() => fallbackCopy(report));
  } else {
    fallbackCopy(report);
  }
}

// ============================================================
// 自定义规则面板
// ============================================================
function showCustomRules() {
  const panel = document.getElementById('customRulesPanel');
  panel.classList.toggle('hidden');
  document.getElementById('batchPanel').classList.add('hidden');
  renderCustomRules();
}

function renderCustomRules() {
  const saved = JSON.parse(localStorage.getItem(CUSTOM_RULES_KEY) || '[]');
  const container = document.getElementById('customRulesList');
  if (saved.length === 0) {
    container.innerHTML = '<p class="text-xs text-gray-400 text-center py-3">暂无自定义规则</p>';
    return;
  }
  container.innerHTML = saved.map((r, idx) =>
    `<div class="flex items-center justify-between bg-gray-50 rounded px-3 py-2">
      <div>
        <span class="text-sm font-medium text-slate-700">${r.name}</span>
        <span class="text-xs text-slate-400 ml-2">/${r.pattern}/</span>
        <span class="text-xs ml-1 issue-tag issue-${r.type || 'other'}">${r.type || 'other'}</span>
      </div>
      <button onclick="removeCustomRule(${idx});renderCustomRules();" class="text-red-400 hover:text-red-600 text-xs"><i class="fa fa-times"></i></button>
    </div>`
  ).join('');
}

function addCustomRule() {
  const name = document.getElementById('customRuleName').value.trim();
  const pattern = document.getElementById('customRulePattern').value.trim();
  const type = document.getElementById('customRuleType').value;
  if (!name || !pattern) { alert('请填写规则名称和正则表达式'); return; }
  // 验证正则有效性
  try { new RegExp(pattern); } catch(e) { alert('正则表达式无效：' + e.message); return; }
  saveCustomRule(name, pattern, type);
  document.getElementById('customRuleName').value = '';
  document.getElementById('customRulePattern').value = '';
  renderCustomRules();
  addToast('已添加自定义规则');
}

// ============================================================
// 批量处理
// ============================================================
const batchFiles = [];

function showBatchPanel() {
  const panel = document.getElementById('batchPanel');
  panel.classList.toggle('hidden');
  document.getElementById('customRulesPanel').classList.add('hidden');
}

function handleFiles(files) {
  batchFiles.length = 0;
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = '';

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      batchFiles.push({ name: file.name, content: e.target.result, size: file.size });
      const badge = document.createElement('span');
      badge.className = 'file-badge inline-flex items-center gap-1 px-2 py-1 bg-indigo-100 text-indigo-700 rounded text-xs';
      badge.innerHTML = `<i class="fa fa-file-text-o"></i> ${file.name}`;
      fileList.appendChild(badge);
    };
    reader.readAsText(file);
  });

  // 延迟处理，等待所有文件加载
  setTimeout(processBatchFiles, 500);
}

function processBatchFiles() {
  if (batchFiles.length === 0) { addToast('没有文件需要处理'); return; }
  const resultsContainer = document.getElementById('batchResults');
  resultsContainer.innerHTML = '';

  let combinedHtml = '';
  let totalIssues = 0;

  batchFiles.forEach((file, fi) => {
    const text = file.content;
    const lines = text.split('\n');
    const allRules = { ...RULES, ...loadCustomRules() };
    let fileViolations = [];

    Object.values(allRules).forEach(rule => {
      try {
        const violations = rule.check(text, lines);
        violations.forEach(v => { v.ruleName = rule.name; });
        fileViolations = fileViolations.concat(violations);
      } catch(e) {}
    });

    // 去重
    const seen = new Set();
    fileViolations = fileViolations.filter(v => {
      const key = `${v.line}-${v.index || 0}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    totalIssues += fileViolations.length;

    const bgColor = fileViolations.length === 0 ? 'bg-green-50' : 'bg-amber-50';
    combinedHtml += `<div class="${bgColor} rounded-lg p-3 border border-slate-200">
      <div class="flex items-center justify-between mb-2">
        <span class="font-medium text-sm text-slate-700"><i class="fa fa-file-text-o mr-1"></i>${file.name}</span>
        <span class="text-xs ${fileViolations.length === 0 ? 'text-green-500' : 'text-red-500'}">${fileViolations.length} 个问题</span>
      </div>
      ${fileViolations.length > 0 ? `<div class="text-xs text-slate-500 max-h-24 overflow-y-auto">
        ${fileViolations.slice(0, 20).map(v => `L${v.line}: ${v.ruleName} → ${v.content.length > 30 ? v.content.substring(0, 30) + '...' : v.content}`).join('<br>')}
        ${fileViolations.length > 20 ? `<br>... 还有 ${fileViolations.length - 20} 个问题` : ''}
      </div>` : '<p class="text-xs text-green-500">检查通过</p>'}
    </div>`;
  });

  resultsContainer.innerHTML = `<div class="mb-2 text-sm font-medium text-slate-700">共处理 ${batchFiles.length} 个文件，发现 ${totalIssues} 个问题</div>${combinedHtml}`;

  // 批量导出
  if (totalIssues > 0) {
    const exportBtn = document.createElement('button');
    exportBtn.className = 'mt-3 bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600';
    exportBtn.innerHTML = '<i class="fa fa-download mr-1"></i>导出批量报告';
    exportBtn.onclick = exportBatchReport;
    resultsContainer.appendChild(exportBtn);
  }
  addToast(`批量处理完成：${batchFiles.length} 个文件`);
}

function exportBatchReport() {
  let report = '# Markdown 批量排版检查报告\n\n';
  report += `检查时间：${new Date().toLocaleString()}\n`;
  report += `文件数量：${batchFiles.length}\n\n`;
  batchFiles.forEach(file => {
    report += `## ${file.name}\n`;
    report += `- 文件大小：${file.size} 字节\n`;
    // 简单统计
    const chineseCount = (file.content.match(/[\u4e00-\u9fff]/g) || []).length;
    const wordCount = (file.content.match(/[a-zA-Z]+/g) || []).length;
    report += `- 中文字数：${chineseCount}\n`;
    report += `- 英文词数：${wordCount}\n\n`;
  });

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(report).then(() => addToast('批量报告已复制')).catch(() => fallbackCopy(report));
  } else {
    fallbackCopy(report);
  }
}

// ============================================================
// 工具函数
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  addToast('已复制到剪贴板');
}

function addToast(msg) {
  const el = document.createElement('div');
  el.className = 'fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-lg text-sm z-50 animate-bounce';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ============================================================
// 事件绑定
// ============================================================
editor.addEventListener('input', () => {
  charCount.textContent = `${editor.value.length} 字符`;
});

document.addEventListener('DOMContentLoaded', () => {
  loadSample();
});
</script>
